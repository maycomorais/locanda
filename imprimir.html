<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imprimir Comanda - Locanda Pizzeria</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Barlow', 'Arial Narrow', Arial, sans-serif;
            background: #bbb;
            padding: 16px;
            font-size: 13px;
        }

        .ticket {
            background: #fff;
            max-width: 300px;
            margin: 0 auto;
            padding: 10px 10px 8px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.2);
        }

        /* LOGO */
        .logo-box { text-align: center; margin-bottom: 4px; }
        .logo-box img { max-width: 80px; max-height: 50px; object-fit: contain; }

        /* CABECALHO */
        .nome-loja { text-align:center; font-size:16px; font-weight:800; letter-spacing:1px; line-height:1.2; }
        .sub-loja  { text-align:center; font-size:11px; color:#555; margin-bottom:4px; }
        .num-pedido { text-align:center; font-size:15px; font-weight:700; }

        hr { border:none; border-top:1px dashed #666; margin:5px 0; }

        /* INFO */
        .info-line { font-size:11px; line-height:1.55; }
        .info-line b { font-size:10px; color:#444; }

        /* TIPO ENTREGA */
        .tipo-entrega-tx { text-align:center; font-size:13px; font-weight:800; letter-spacing:1px; margin:3px 0 2px; }
        .endereco-ref    { font-size:11px; text-align:center; margin-bottom:2px; }

        /* TABELA ITENS */
        table { width:100%; border-collapse:collapse; }
        thead th {
            font-size:10px; font-weight:700;
            border-bottom:1px dashed #666;
            padding-bottom:2px;
            text-transform:uppercase;
        }
        thead th:last-child { text-align:right; }
        tbody td { font-size:12px; font-weight:600; padding:3px 0; vertical-align:top; }
        tbody td:last-child { text-align:right; white-space:nowrap; }

        .item-variacao { font-size:11px; font-weight:700; color:#c0392b; }
        .item-montagem { font-size:11px; font-weight:600; color:#222; line-height:1.45; }
        .item-montagem b { color:#555; }
        .item-preparo  { font-size:10px; color:#2980b9; }
        .item-obs      { font-size:10px; font-weight:700; color:#c0392b; }

        /* TOTAIS */
        .totals      { text-align:right; font-size:11px; line-height:1.7; }
        .total-final { font-size:16px; font-weight:800; text-align:right; }

        /* PAGAMENTO */
        .pag-metodo { font-size:12px; font-weight:700; }
        .pag-obs    { font-size:11px; line-height:1.5; }

        /* FACTURA */
        .box-factura { border:1px dashed #666; padding:4px 6px; font-size:10px; line-height:1.6; margin-top:4px; }

        .rodape { text-align:center; font-size:10px; color:#555; margin-top:4px; }

        .btn-print {
            display:block; width:100%; padding:14px;
            background:#1a7a2e; color:white; border:none;
            font-size:16px; font-weight:700; cursor:pointer;
            margin-top:16px; border-radius:8px; font-family:inherit;
        }

        /* ── IMPRESSAO TERMICA 58mm — alvo maximo ~10cm ── */
        @media print {
            body { background:none; padding:0; margin:0; font-size:12px; -webkit-print-color-adjust:exact; }
            .btn-print { display:none; }
            .ticket { box-shadow:none; max-width:100%; width:100%; margin:0; padding:2px 3px; }
            @page { margin:1.5mm; size:58mm auto; }

            .nome-loja    { font-size:14px; }
            .sub-loja     { font-size:10px; }
            .num-pedido   { font-size:13px; }
            .tipo-entrega-tx { font-size:12px; }
            .info-line    { font-size:10px; }
            .endereco-ref { font-size:10px; }
            table         { font-size:11px; }
            thead th      { font-size:9px; }
            tbody td      { font-size:11px; padding:2px 0; }
            .item-variacao  { font-size:11px; }
            .item-montagem  { font-size:11px; }
            .item-obs       { font-size:11px; }
            .item-preparo   { font-size:11px; }
            .totals      { font-size:10px; line-height:1.5; }
            .total-final { font-size:14px; }
            .pag-metodo  { font-size:11px; }
            .pag-obs     { font-size:10px; }
            .rodape      { font-size:9px; }
            .box-factura { font-size:9px; }
            hr { margin:3px 0; }
            .logo-box img { max-width:55px; max-height:55px; }
        }
    </style>
<base target="_blank">
</head>
<body>
<div class="ticket">

    <!-- ★★★ LOGO — cole o link da imagem em LOGO_URL no script abaixo ★★★ -->
    <div class="logo-box" id="logo-box" style="display:none">
        <img id="logo-img" src="" alt="Logo"
             onerror="document.getElementById('logo-box').style.display='none'">
    </div>

    <!-- <div class="nome-loja" id="nome-loja">LOCANDA PIZZERIA</div> -->
    <p class="sub-loja" id="sub-loja">Tel: +595 984 692537</p>
    <p class="num-pedido">PEDIDO #<span id="id-pedido">---</span></p>
    <hr>

    <div class="info-line">
        <b>Data:</b> <span id="data-hora">---</span><br>
        <b>Cliente:</b> <span id="nome">---</span><br>
        <b>Tel:</b> <span id="tel">---</span>
    </div>
    <hr>

    <div class="tipo-entrega-tx"><span id="tipo-entrega">---</span></div>
    <div class="endereco-ref" id="endereco-box" style="display:none">
        <span id="ref-entrega">---</span>
    </div>
    <hr>

    <table>
        <thead>
            <tr>
                <th style="width:12%">Qtd</th>
                <th>Item</th>
                <th>Total</th>
            </tr>
        </thead>
        <tbody id="lista-itens">
            <tr><td colspan="3" style="text-align:center;padding:6px">Carregando...</td></tr>
        </tbody>
    </table>
    <hr>

    <div class="totals">
        Subtotal: <span id="subtotal">Gs 0</span><br>
        <span id="frete-row">Frete: <span id="frete">Gs 0</span></span><br>
    </div>
    <div class="total-final">TOTAL: <span id="total-geral">Gs 0</span></div>
    <hr>

    <span class="pag-metodo" id="forma-pag">---</span>
    <div class="pag-obs" id="obs-pag"></div>

    <div id="box-factura" class="box-factura" style="display:none">
        <b>FACTURA:</b> RUC: <span id="ruc">---</span> — <span id="razao">---</span>
    </div>

    <hr>
    <p class="rodape">*** OBRIGADO PELA PREFERÊNCIA ***</p>
</div>

<button class="btn-print" onclick="window.print()">🖨️ IMPRIMIR PEDIDO</button>

<script>
    const LOGO_URL = 'https://i.ibb.co/nqFZ9h2j/Locanda2.png';
    // ══════════════════════════════════════════════════════════

    window.onload = function() {
        // Aplica logo se configurada
        if (LOGO_URL) {
            const logoBox = document.getElementById('logo-box');
            const logoImg = document.getElementById('logo-img');
            if (logoBox && logoImg) {
                logoImg.src = LOGO_URL;
                logoBox.style.display = 'block';
            }
        }

        const params = new URLSearchParams(window.location.search);
        const codigoBase64 = params.get('d');

        if (!codigoBase64) {
            document.body.innerHTML = "<h3 style='text-align:center;color:red;margin-top:50px'>Erro: Link inválido.</h3>";
            return;
        }

        try {
            const b64 = codigoBase64.replace(/-/g, '+').replace(/_/g, '/');
            const pad = b64.length % 4;
            const b64p = pad ? b64 + '='.repeat(4 - pad) : b64;
            const pedido = JSON.parse(decodeURIComponent(escape(atob(b64p))));

            // Cabeçalho
            document.getElementById('id-pedido').innerText = pedido.id || 'S/N';
            document.getElementById('data-hora').innerText = pedido.data || new Date().toLocaleString('pt-BR');
            document.getElementById('nome').innerText = pedido.cliente?.nome || 'Cliente';
            document.getElementById('tel').innerText = pedido.cliente?.tel || 'S/N';

            // Entrega
            const tipo = pedido.entrega?.tipo || 'delivery';
            const tipoLabel = tipo === 'balcao'   ? '🏪 BALCÃO / MESA'
                            : tipo === 'retirada' ? '🖐 RETIRADA'
                            : '🛵 DELIVERY';
            document.getElementById('tipo-entrega').innerText = tipoLabel;

            // Oculta frete para balcão e retirada
            if (tipo !== 'delivery') {
              const freteRow = document.getElementById('frete-row');
              if (freteRow) freteRow.style.display = 'none';
            }

            if (pedido.entrega?.ref) {
                document.getElementById('endereco-box').style.display = 'block';
                document.getElementById('ref-entrega').innerText = pedido.entrega.ref;
            }

            // Itens
            const tbody = document.getElementById('lista-itens');
            tbody.innerHTML = '';
            const itens = Array.isArray(pedido.itens) ? pedido.itens : [];

            if (itens.length > 0) {
                itens.forEach((item, idx) => {
                    const qtd      = item.q  ?? item.qtd  ?? 1;
                    const nome     = item.n  || item.nome || ('Item ' + (idx + 1));
                    const preco    = parseFloat(item.p ?? item.preco ?? 0) || 0;
                    const variacao = item.t  || item.variacao || '';
                    const preparo  = item.pr || item.preparo  || '';
                    const montagem = item.m  || item.montagem || [];
                    const obs      = item.o  || item.obs      || '';

                    let detalhes = '';

                    // Tamanho / variação (ex: "Pizza G", "Grande")
                    if (variacao && variacao !== nome) {
                        detalhes += `<div class="item-variacao">▸ ${variacao}</div>`;
                    }
                    // Sabores / montagem
                    if (Array.isArray(montagem) && montagem.length > 0) {
                        montagem.forEach(linha => {
                            const ci = linha.indexOf(':');
                            if (ci > 0) {
                                detalhes += `<div class="item-montagem"><b>${linha.slice(0, ci)}:</b> ${linha.slice(ci + 1).trim()}</div>`;
                            } else {
                                detalhes += `<div class="item-montagem">${linha}</div>`;
                            }
                        });
                    }
                    if (preparo) detalhes += `<div class="item-preparo">🍳 ${preparo}</div>`;
                    if (obs)     detalhes += `<div class="item-obs">⚠️ ${obs}</div>`;

                    const total = (preco * qtd).toLocaleString('es-PY');
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td>${qtd}x</td><td>${nome}${detalhes}</td><td>Gs ${total}</td>`;
                    tbody.appendChild(tr);
                });
            } else {
                tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:#e74c3c">Nenhum item</td></tr>';
            }

            // Totais
            const v = pedido.valores || {};
            document.getElementById('subtotal').innerText    = `Gs ${(v.sub    || v.subtotal   || 0).toLocaleString('es-PY')}`;
            document.getElementById('frete').innerText       = `Gs ${(v.frete  || 0).toLocaleString('es-PY')}`;
            document.getElementById('total-geral').innerText = `Gs ${(v.total  || v.total_geral || 0).toLocaleString('es-PY')}`;

            // Pagamento
            const pg = pedido.pagamento || {};
            const metodo = pg.metodo || pg.forma_pagamento || 'Não informado';
            const obsPag = pg.obs || pg.obs_pagamento || '';

            if (metodo === 'Multipagamento') {
                document.getElementById('forma-pag').innerText = '🔀 Pag. dividido:';
                try {
                    const partes = JSON.parse(obsPag);
                    document.getElementById('obs-pag').innerHTML = partes.map((p, i) => {
                        let l = `${i+1}. ${p.metodo}: Gs ${parseFloat(p.valor).toLocaleString('es-PY')}`;
                        if (p.troco) l += ` (Troco p/ ${p.troco})`;
                        return l;
                    }).join('<br>');
                } catch(e) {
                    document.getElementById('obs-pag').innerText = obsPag;
                }
            } else {
                document.getElementById('forma-pag').innerText = metodo;
                document.getElementById('obs-pag').innerText   = obsPag;
            }

            // Factura
            if (pedido.factura && (pedido.factura.ruc || pedido.factura.razao)) {
                document.getElementById('box-factura').style.display = 'block';
                document.getElementById('ruc').innerText   = pedido.factura.ruc   || 'S/N';
                document.getElementById('razao').innerText = pedido.factura.razao || 'S/N';
            }

            setTimeout(() => window.print(), 700);

        } catch(e) {
            console.error('Erro:', e);
            document.body.innerHTML = `<h3 style='text-align:center;color:red;margin-top:50px'>
                Erro ao ler o pedido.<br><small>${e.message}</small><br><br>
                <button onclick="window.close()" style="padding:10px 20px;background:#1a7a2e;color:#fff;border:none;border-radius:5px;cursor:pointer">Fechar</button>
            </h3>`;
        }
    }
</script>
</body>
</html>
